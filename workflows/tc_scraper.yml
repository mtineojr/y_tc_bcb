name: TC BCB — Scraping Diario

on:
  schedule:
    # 07:00 hora Bolivia (BOT = UTC-4) = 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch:
    # Permite correr manualmente desde GitHub Actions en cualquier momento

jobs:
  scrape_tc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 pytz

      - name: Correr scraper
        run: python scraper/bcb_scraper.py

      - name: Commit y push del CSV actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tc_bcb.csv
          git diff --cached --quiet || git commit -m "TC BCB: $(date -u '+%Y-%m-%d') [auto]"
          git push
